services:

  db:
    container_name: javaline-db
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: javaline
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - javaline

  backend:
    container_name: javaline-backend
    build:
      context: ./dotnet-backend
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__Default: "Host=db;Database=javaline;Username=postgres;Password=${POSTGRES_PASSWORD}"
      AppSettings__JwtSecret: ${JWT_SECRET:?JWT_SECRET must be set}
      AppSettings__JwtIssuer: javaline.commercial
      AppSettings__JwtAudience: javaline.commercial
      AppSettings__JwtExpirationMinutes: "60"
      AppSettings__CorsOrigins: "http://localhost"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - javaline

  frontend:
    container_name: javaline-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - javaline

volumes:
  pgdata:

networks:
  javaline:
    driver: bridge
