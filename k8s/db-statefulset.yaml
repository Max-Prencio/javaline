apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: javaline-db
  namespace: javaline
  labels:
    app: javaline
    component: database
spec:
  serviceName: javaline-db
  replicas: 1
  selector:
    matchLabels:
      app: javaline
      component: database
  template:
    metadata:
      labels:
        app: javaline
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: javaline-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "javaline"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
